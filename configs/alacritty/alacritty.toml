# Nordic theme matching waybar palette

[font]
size = 12.0

[font.normal]
family = "RobotoMono Nerd Font Mono"
style = "Regular"

[font.bold]
style = "Bold"

[font.italic]
style = "Italic"

[window]
padding = { x = 8, y = 8 }
opacity = 1

# Nord color scheme
# https://www.nordtheme.com
[colors.primary]
background = "#2E3440"
foreground = "#D8DEE9"
dim_foreground = "#A5AAAF"
bright_foreground = "#ECEFF4"

[colors.cursor]
text = "#2E3440"
cursor = "#D8DEE9"

[colors.vi_mode_cursor]
text = "#2E3440"
cursor = "#88C0D0"

[colors.selection]
text = "CellForeground"
background = "#4C566A"

[colors.search.matches]
foreground = "#2E3440"
background = "#88C0D0"

[colors.search.focused_match]
foreground = "#2E3440"
background = "#5E81AC"

[colors.footer_bar]
foreground = "#D8DEE9"
background = "#434C5E"

[colors.hints.start]
foreground = "#2E3440"
background = "#EBCB8B"

[colors.hints.end]
foreground = "#2E3440"
background = "#5E81AC"

# Polar Night
# Nord 0-3: dark backgrounds
